<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reserva do laboratório</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Reserva do Laboratório de Informática</h1>

    <div class="formulario">
      <input type="text" id="professor" placeholder="Nome do professor" />
      <input type="date" id="data" />

      <select id="horario">
        <option>08:00</option>
        <option>09:00</option>
        <option>10:00</option>
        <option>11:00</option>
        <option>12:00</option>
        <option>13:00</option>
        <option>14:00</option>
        <option>15:00</option>
        <option>16:00</option>
      </select>

      <button onclick="reservar()">Reservar</button>
    </div>

    <h2>Reservar</h2>
    <ul id="lista"></ul>

    <script src="script.js"></script>
  </body>
</html>
